name: 🔄 Auto-Sync Upstream

on:
  schedule:
    - cron: '0 4 * * *' # Every day at 4:00 AM UTC
  workflow_dispatch: # Enable manual triggers

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream Remote
        run: git remote add upstream https://github.com/ml-explore/mlx-swift.git

      - name: Fetch Upstream
        run: git fetch upstream

      - name: Create or Update Sync Branch
        id: sync_branch
        run: |
          git checkout -B sync/upstream-latest origin/main

          if git diff --quiet origin/main upstream/main -- . ':(exclude).github/workflows'; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes after preserving fork workflows."
            exit 0
          fi

          git diff --binary origin/main upstream/main -- . ':(exclude).github/workflows' | git apply --index
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          git commit -m "chore: sync with upstream/main"
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          git push -f origin sync/upstream-latest

      - name: Create Pull Request to Main
        if: steps.sync_branch.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_PR_NUMBER=$(gh api \
            --method GET \
            "/repos/${GITHUB_REPOSITORY}/pulls" \
            -f base=main \
            -f head="${GITHUB_REPOSITORY_OWNER}:sync/upstream-latest" \
            -f state=open \
            --jq '.[0].number // empty')

          if [[ -n "$EXISTING_PR_NUMBER" ]]; then
            echo "PR #$EXISTING_PR_NUMBER already exists for sync/upstream-latest."
            exit 0
          fi

          gh api \
            --method POST \
            "/repos/${GITHUB_REPOSITORY}/pulls" \
            -f base=main \
            -f head="${GITHUB_REPOSITORY_OWNER}:sync/upstream-latest" \
            -f title="🔄 Auto-Sync: Apple Upstream Repository" \
            -f body="Automated PR to synchronize SharpAI fork with Apple mlx-swift upstream repository. Please review merge conflicts (if any) and verify CI pipelines." \
            --jq '.html_url'

      - name: Dispatch Sync Branch Validation
        if: steps.sync_branch.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SYNC_HEAD_SHA: ${{ steps.sync_branch.outputs.head_sha }}
        run: |
          post_status() {
            local workflow_name="$1"
            local state="$2"
            local description="$3"
            local target_url="$4"

            gh api \
              --method POST \
              "/repos/${GITHUB_REPOSITORY}/statuses/${SYNC_HEAD_SHA}" \
              -f state="$state" \
              -f context="sync-dispatch/${workflow_name}" \
              -f target_url="$target_url" \
              -f description="$description" >/dev/null
          }

          dispatch_workflow() {
            local workflow_file="$1"
            local workflow_name="$2"

            post_status "$workflow_name" "pending" "${workflow_name} is queued" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}"
            gh workflow run "$workflow_file" --repo "$GITHUB_REPOSITORY" --ref sync/upstream-latest
          }

          find_run_id() {
            local workflow_file="$1"

            gh api \
              --method GET \
              "/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}/runs" \
              -f branch=sync/upstream-latest \
              -f event=workflow_dispatch \
              -f per_page=20 \
              --jq 'first(.workflow_runs[] | select(.head_sha == env.SYNC_HEAD_SHA) | .id) // ""'
          }

          wait_for_run_id() {
            local workflow_file="$1"
            local workflow_name="$2"
            local attempt_count
            local run_id

            for attempt_count in {1..30}; do
              run_id=$(find_run_id "$workflow_file")
              if [[ -n "$run_id" ]]; then
                echo "$run_id"
                return 0
              fi

              echo "Waiting for ${workflow_name} run to be created (${attempt_count}/30)." >&2
              sleep 5
            done

            echo "Timed out waiting for ${workflow_name} run to be created." >&2
            return 1
          }

          wait_for_run_completion() {
            local run_id="$1"
            local workflow_name="$2"
            local attempt_count
            local run_data
            local run_status
            local run_conclusion
            local run_url

            for attempt_count in {1..180}; do
              run_data=$(gh run view "$run_id" \
                --repo "$GITHUB_REPOSITORY" \
                --json status,conclusion,url \
                --jq '[.status, (.conclusion // ""), .url] | @tsv')
              IFS=$'\t' read -r run_status run_conclusion run_url <<< "$run_data"

              if [[ "$run_status" == "completed" ]]; then
                if [[ "$run_conclusion" == "success" ]]; then
                  post_status "$workflow_name" "success" "${workflow_name} passed" "$run_url"
                  return 0
                fi

                post_status "$workflow_name" "failure" "${workflow_name} completed with ${run_conclusion:-unknown}" "$run_url"
                return 1
              fi

              post_status "$workflow_name" "pending" "${workflow_name} is ${run_status}" "$run_url"
              echo "Waiting for ${workflow_name} run ${run_id} to complete: ${run_status} (${attempt_count}/180)."
              sleep 30
            done

            run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${run_id}"
            post_status "$workflow_name" "failure" "${workflow_name} timed out" "$run_url"
            echo "Timed out waiting for ${workflow_name} run ${run_id}." >&2
            return 1
          }

          dispatch_workflow swiftlm_integration.yml "SwiftLM Integration Tests"
          dispatch_workflow downstream_integration.yml "Downstream Integration Test"

          SWIFTLM_RUN_ID=$(wait_for_run_id swiftlm_integration.yml "SwiftLM Integration Tests")
          DOWNSTREAM_RUN_ID=$(wait_for_run_id downstream_integration.yml "Downstream Integration Test")

          SWIFTLM_RESULT=0
          DOWNSTREAM_RESULT=0

          wait_for_run_completion "$SWIFTLM_RUN_ID" "SwiftLM Integration Tests" || SWIFTLM_RESULT=$?
          wait_for_run_completion "$DOWNSTREAM_RUN_ID" "Downstream Integration Test" || DOWNSTREAM_RESULT=$?

          if [[ "$SWIFTLM_RESULT" -ne 0 || "$DOWNSTREAM_RESULT" -ne 0 ]]; then
            exit 1
          fi
