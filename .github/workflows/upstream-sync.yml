name: 🔄 Auto-Sync Upstream

on:
  schedule:
    - cron: '0 4 * * *' # Every day at 4:00 AM UTC
  workflow_dispatch: # Enable manual triggers

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream Remote
        run: git remote add upstream https://github.com/ml-explore/mlx-swift.git

      - name: Fetch Upstream
        run: git fetch upstream

      - name: Create or Update Sync Branch
        id: sync_branch
        run: |
          git checkout -B sync/upstream-latest origin/main

          if git diff --quiet origin/main upstream/main -- . ':(exclude).github/workflows'; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes after preserving fork workflows."
            exit 0
          fi

          git diff --binary origin/main upstream/main -- . ':(exclude).github/workflows' | git apply --index
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          git commit -m "chore: sync with upstream/main"
          git push -f origin sync/upstream-latest

      - name: Create Pull Request to Main
        if: steps.sync_branch.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_PR_NUMBER=$(gh pr list \
            --base main \
            --head sync/upstream-latest \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [[ -n "$EXISTING_PR_NUMBER" ]]; then
            echo "PR #$EXISTING_PR_NUMBER already exists for sync/upstream-latest."
            exit 0
          fi

          gh pr create --base main --head sync/upstream-latest \
            --title "🔄 Auto-Sync: Apple Upstream Repository" \
            --body "Automated PR to synchronize SharpAI fork with Apple mlx-swift upstream repository. Please review merge conflicts (if any) and verify CI pipelines."
