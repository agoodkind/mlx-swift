name: Sync Validation Status

on:
  workflow_run:
    workflows:
      - SwiftLM Integration Tests
      - Downstream Integration Test
    types:
      - requested
      - completed

permissions:
  statuses: write

jobs:
  report:
    if: github.event.workflow_run.head_branch == 'sync/upstream-latest' && github.event.workflow_run.event == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Post sync validation status
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          EVENT_ACTION: ${{ github.event.action }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          STATUS_STATE="pending"
          STATUS_DESCRIPTION="${WORKFLOW_NAME} is running"

          if [[ "$EVENT_ACTION" == "completed" ]]; then
            if [[ "$CONCLUSION" == "success" ]]; then
              STATUS_STATE="success"
              STATUS_DESCRIPTION="${WORKFLOW_NAME} passed"
            else
              STATUS_STATE="failure"
              STATUS_DESCRIPTION="${WORKFLOW_NAME} completed with ${CONCLUSION:-unknown}"
            fi
          fi

          gh api \
            --method POST \
            "/repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state="$STATUS_STATE" \
            -f context="sync-dispatch/${WORKFLOW_NAME}" \
            -f target_url="$RUN_URL" \
            -f description="$STATUS_DESCRIPTION"
